run:
  timeout: 10m
  issues-exit-code: 0
  skip-dirs:
    - build

linters:
  disable-all: true
  enable:
    - misspell
    - ineffassign
    - typecheck
    - unused
    - gosimple
    - goimports
    - errcheck
    - staticcheck
    - stylecheck
    - gosec
    - asciicheck
    - bodyclose
    - unconvert
    - prealloc
    - revive

linters-settings:
  staticcheck:
    checks: ["S1002","S1004","S1007","S1009","S1010","S1012","S1019","S1020","S1021","S1024","S1030","SA2*","SA3*","SA4009","SA5*","SA6000","SA6001","SA6005", "-SA2002"]
  stylecheck:
    checks: ["-ST1003"]
  revive:
    severity: warning
    ignore-generated-header: true
    confidence: 0.8
    enable-all-rules: false
    rules:
      - name: blank-imports
        disabled: false
        severity: error
      - name: context-as-argument
        disabled: false
        severity: error
      - name: error-return
        disabled: false
        severity: error
      - name: error-strings
        disabled: false
        severity: error
      - name: exported
        disabled: false
        arguments:
        - disableStutteringCheck
      - name: if-return
        disabled: false
      - name: increment-decrement
        disabled: false
      - name: var-naming
        disabled: false
      - name: var-declaration
        disabled: false
      - name: range
        disabled: false
      - name: receiver-naming
        disabled: false
      - name: unreachable-code
        disabled: false

issues:
  exclude-use-default: false
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - makezero
