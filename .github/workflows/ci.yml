name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (includes the dependency-isolation invariant + manual-mode zero-DNS guarantee)
        run: go test ./...
